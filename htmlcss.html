<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>HTML+CSS - Tema Zoom</title>
    <!-- FAVICON (ícone do site) -->
    <link rel="icon" type="image/png" href="logo.zoom.jpg">
    <style>
        body {
            font-family: Arial;
            background: #0a0a1a url('zoom2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #00e5ff;
            text-shadow: 0 0 15px #00e5ff;
            text-transform: uppercase;
        }

        .btn-zoom {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.7);
            color: #00e5ff;
            border: 2px solid #00e5ff;
            box-shadow: 0 0 15px #00e5ff;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-zoom:hover {
            background: #0d47a1;
            color: #fff;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <h1>HTML+CSS</h1>
    <p>Exemplos e exercícios de HTML e CSS.</p>
    <a href="https://robinho1512.github.io/teste.html/teste.html" class="btn-zoom">Exemplo HTML+CSS</a>
    <br><br>
    <a href="index.html" class="btn-zoom">Voltar ao Início</a>
</body>

</html>
