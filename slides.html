<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Slides - Tema Zoom</title>
    <!-- FAVICON (ícone do site) -->
    <link rel="icon" type="image/png" href="logo.zoom.jpg">
    <style>
        body {
            font-family: Arial;
            background: #0a0a1a url('zoom2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #00e5ff;
            text-shadow: 0 0 15px #00e5ff;
            text-transform: uppercase;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        a {
            text-decoration: none;
        }

        .btn-zoom {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.7);
            color: #00e5ff;
            border: 2px solid #00e5ff;
            box-shadow: 0 0 15px #00e5ff, inset 0 0 10px #000;
            transition: 0.3s;
        }

        .btn-zoom:hover {
            background: #0d47a1;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 25px #00e5ff, inset 0 0 15px #0d47a1;
        }
    </style>
</head>

<body>
    <h1>Slides</h1>
    <p>Apresentações criadas para projetos e aulas.</p>
    <ul>
        <li><a href="https://gamma.app/docs/propriedade-autoral--ulpkqa3qhzouxm5" class="btn-zoom">Direitos Autorais</a>
        </li>
        <li><a href="https://gamma.app/docs/Agenda-Escolar-2026-jcstf8890ifda96" class="btn-zoom">Agenda Escolar</a>
        </li>
    </ul>
    <a href="index.html" class="btn-zoom">Voltar ao Início</a>
</body>

</html>
