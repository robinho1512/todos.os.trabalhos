<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Portal Unidade Polo - Tema Zoom</title>

  <!-- FAVICON (ícone do site) -->
  <link rel="icon" type="image/png" href="logo.zoom.jpg">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a1a;
      /* Azul escuro */
      color: #fff;
      text-align: center;
      padding: 50px;
      background: url('zoom2.jpg');
      background-size: cover;
    }

    h1 {
      color: #00e5ff;
      text-shadow: 0 0 15px #00e5ff, 2px 2px #000;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .btn-zoom {
      padding: 20px 40px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
      background: rgba(0, 0, 0, 0.7);
      color: #00e5ff;
      border: 2px solid #00e5ff;
      box-shadow: 0 0 15px #00e5ff, inset 0 0 10px #000;
    }

    .btn-zoom:hover {
      background: #0d47a1;
      color: #fff;
      transform: scale(1.1);
      box-shadow: 0 0 25px #00e5ff, inset 0 0 15px #0d47a1;
    }
  </style>
</head>

<body>
  <h1>Portal Unidade Polo - Tema Zoom</h1>
  <div class="btn-group">
    <a href="slides.html" class="btn-zoom">Slides</a>
    <a href="redacoes.html" class="btn-zoom">Redações</a>
    <a href="htmlcss.html" class="btn-zoom">HTML+CSS</a>
    <a href="nodejs.html" class="btn-zoom">Node.js</a>
  </div>
</body>

</html>
