<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Node.js - Tema Zoom</title>
    <!-- FAVICON (ícone do site) -->
    <link rel="icon" type="image/png" href="logo.zoom.jpg">
    <style>
        body {
            font-family: Arial;
            background: #0a0a1a url('zoom2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #00e5ff;
            text-shadow: 0 0 15px #00e5ff;
            text-transform: uppercase;
        }

        p {
            margin-bottom: 30px;
        }

        .btn-zoom {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.7);
            color: #00e5ff;
            border: 2px solid #00e5ff;
            box-shadow: 0 0 15px #00e5ff, inset 0 0 10px #000;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-zoom:hover {
            background: #0d47a1;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 25px #00e5ff, inset 0 0 15px #0d47a1;
        }
    </style>
</head>

<body>
    <h1>Node.js</h1>
    <p>Exemplos e exercícios de Node.js.</p>

    <!-- Botões para os links -->
    <a href="https://github.com/robinho1512/teste.html/blob/main/teste3.js" class="btn-zoom">Primeira aula</a>
    <a href="https://github.com/robinho1512/variaveis/blob/main/variaveis.js" class="btn-zoom">Variáveis</a>
    <a href="https://github.com/robinho1512/testandofor/blob/main/usandofor.js" class="btn-zoom">Usando For</a>

    <br><br>
    <!-- Botão para voltar ao início -->
    <a href="index.html" class="btn-zoom">Voltar ao Início</a>
</body>

</html>
